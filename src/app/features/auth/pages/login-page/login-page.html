<section class="login-shell">
  <div class="login-shell__panel">
    <div class="login-shell__brand">
      <img alt="Logo SISPARK" src="images/logo_moderno_de_sispark.png" />
      <div>
        <span>SISPARK</span>
        <small>Acceso administrativo</small>
      </div>
    </div>

    <h1>Inicia sesión</h1>
    <p>Ingresa con tu usuario del sistema para acceder al panel administrativo de SISPARK.</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label" for="username">Usuario</label>
        <input id="username" class="form-control" formControlName="username" placeholder="user123" />
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input
          id="password"
          class="form-control"
          formControlName="password"
          placeholder="******"
          type="password"
        />
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger" role="alert">{{ errorMessage }}</div>
      }

      @if (successMessage) {
        <div class="alert alert-success" role="alert">{{ successMessage }}</div>
      }

      <button class="btn btn-success w-100" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Validando...' : 'Ingresar' }}
      </button>
    </form>

    <div class="login-shell__links">
      <a routerLink="/">Volver al inicio</a>
      <a routerLink="/servicios">Registrar vehículo</a>
    </div>
  </div>
</section>
